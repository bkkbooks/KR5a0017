body:
  text: 米中用水荒年起價業通三世毁罵三寶不孝果報因果不修卜者術誤乃是九幽元惡過多罪足九世之惡惡果滿矣裸露三光身口問九果非禮上前世果報天譴之罪非言非示州非果將非道天露九真惡過罪至癸非天責罪及報應四世貪求不足八嗔獲羅度罪上天檢察前緣惡業天令報應宿緣惡報惡報前緣九業之罪業通具足諸事滿律天貴其報非理所為罪盈足用且非道曲直非正九業具足非理亂真罪滿自受九惡之報九七之罪天察其過九九之罪口業之罪五悖之罪五世之惡四思之惡道言凡有陽世之人身被雷擊可將此符篆證之以知此立乎報應之驗也可以燒香誦轉此經以解尸滯可以燒其天書解之身著地上乃用硃砂併銀硃以黃紙盛授其筆仍安棺槨之上載書其篆以對天文及念九天應元雷聲普化天尊聖號一萬音方翻其尸則動便入棺槨循葬去處如此感應為人豈不知其明有天律之嚴也可以常誦此經能消諸苦及大病死亡不經地獄官災口舌連年困苦負本遠出路途或遇賊惡蟲蛇虎狼之地但念誦斯經自然不能損害凡有患難可以誦持門庭清肅人眷安寧及有起造動土架扇屋宇併修築墻圍有犯神煞及行喪葬有犯墓龍殺神一應去止但燒好香誦此真經以謝各神自然回避不能侵害生人師巫或埋名魘禱翦雞滴血或在廟祀之處及在邪壇將生人名諱因自服法不加及因田園財物口舌紛爭將其名諱在諸去處魘禱知其源者可以燒香誦轉此經却除差來索命邪鬼重則隨經使者官史不待上天律下即以滅形輕則以戒之其神能滅諸邪山魈鬼怪魑魅伏尸及枉死孤魂之鬼并精靈百魔之鬼侵害生人起禍損人命魂久病不瘥連年及求血食山壇冷社將後起疫不能除却但以好香燒告神霄雷主將帥及兵官吏護經靈官將帥將此經轉誦魔魅潜形不能侵損人命或遇夜行將此真經以帕袋服此經却除水陸邪鬼魍魎之神亦不敢侵損魂命使其鬼神潜形永不復害也上天之書以度下民令識宿根知太上之立教凡有萬億之厄轉誦真經無不應護萬邪歸正道法暗祥無量神通音雷霆鄧元帥於玉笥山修行五十二年奏呈玉帝陳說承天開化抉教度人發大誓願滅天下不忠不孝之人及斷鬼魔侵害人物一勿為禍妖邪救生度死忽功行圓滿蒙上帝詔命召赴陸前賜金丹一粒吞服變成鳳觜形翼仍對為歘火律令大神以金鋋鑿各一付之身長一丈赤髮藍身乎是皆為鳳爪受令行事斷天下不忠不孝之人鬼崇之魅一切害民之類以五月五日午時為赴召升仙之日其功果成就敬守于今巳化有劫矣世人不信此神故犯天條致罪滿足獲其神而戮誅身屬北鄷永為鬼趣墮於其中萬萬億劫不復出離如此之報因果昭然世人尤乃故犯條律既犯之後獲報其中悔何得也深可痛哉世人在世不敬三寶天地君親師友正道之人但檢閲此經靜默安神燒香禮拜天地安坐去處看誦此經深詳自悔大有身畏為人豈不染諸緣惡之愆自省人身之本以解日積所為若有果獲當擊身經北鄷受苦何人為汝解釋負受如此果報昭明凡人在世自宜保愛其身凡或有婦人懷娠孕經過月不能分娩或恐非人受胎鬼崇冤家及山壇冷社之鬼假為人形前來託化害其母命痛苦難忍識此因由可燒香望東念救苦天尊聖號四十九音方開誦此經即時人脫其胎即與萬神監生其子福慧雙全女亦如此或是鬼怪冤家則隨經帥將攝下押赴北鄷遂誕死尸其死尸得下之時將栗木數束書大神名字告天仍祝曰從今釋冤不得害人魂命及有官符口舌連年不解困苦將終誦此真經以禳厄難無不應驗門戶方隅改修動土不時有犯殺神興災令人疾病未安知是一切有犯之處請道士延真祈天請命書大聖七元真君名號以黃紙用硃明書其上奉安所犯方位轉誦此經無不應驗清康庭戶大有光輝神之所佑也道出乎太玄之初未判兩儀之先萬物之中惟人第一蟲禽潜蟄尚知時候四時之物豈有異也天地垂明以示人也應期發生流潤人間在世為人何可以謝穹壤之恩凡人在世可尊敬天地君親師友正道佛僧羅漢功果善緣奉揚科教開誘人天從善周始則善神應佑後為惡獲因劫劫墮落地獄經劫受苦人道逺矣縱得人道出生貧窮下賤復不修禮轉轉逺乎聖證無可得遇無上法橋度拔苦趣經世不悟墮落傍生六道輪回一入沈淪難期解釋道言得遏此經乃宿有善功積劫以來幸會天文如有志學之士見此真經一聞便悟若有世人見此真經不信毀謗生生墮落傍類與大道逺矣如或修誦始終既死之後不經地府魂神執此經念念正覺上升南宮朱陵火府時刻受鍊決無宿對世人在世生身快樂歌酒取歡不知樂是苦根貪求取利不知喜是悲目負販南北而不知冬有嚴霜如木凋也根本若實則有春時不循人道之本死之道矣天尊說此真經令使世人受悟歸向正道以識源本免滯輪回在世長年人中殊勝轉轉歸勤仙都記籍善功緣行具足則萬神擁護尸解仙去超度天程升遷仙位命職帝前此經深重不可思議謹而敬之或慢無極之科自生不信仍不奉持身謝之後永處北鄷後悔難及保之受用福不輕矣是時天尊說經將畢龍鶴天仙萬聖千真來迎御坐起席之時諸天魔王及諸人鬼神受法戒旨此經流教下民庶曉歸宗知本逹生榮路不生無道之鄉釋宿命塵輪苦楚見而奉之不可輕泄罪照玄科明有其報戒愼之焉太上說朝天謝雷真經元皇帝君垂讃曰人天居敬福不輕之造化合德運度俯睎雷霆隨巳誓救生滋除滅惡腐輔化乾基周榮萬法變忖莫思敬則從順興道保規逆則烈誓後憶難追笥山修應抉化天隨誅戮惡蠱滅却勃軀發生萬物長決幽為千狀萬類總領在歸人莫不信輕重訊人身一滅何復再求仙樂理常誦其書先修古藥方自度梯推山新匠一出鐫錐普化敬順無量以金闕化身天尊親製詩吾為教主威鎮北天分别人鬼將吏當先雷部聖衆總掌其權誅滅凶惡化作塵煙三茅妙行圎滿天君親製詩天令行威顯小民小存正直保其身禳災解厄看經驗鎚鑿專誅五逆人九天元皇梓潼靈應天君親製頌曰天道福善而禍淫雷霆殺伐警人心吾今顯化令知畏咸使生靈免罪深又頌曰顯化訓民歸正教開揚帝德好生心朝英虔奉刋于梓印施雷經發玉音又頌曰天行號令警戒凡民不知畏懼徒積禍因條法昭示以滅身軀能省巳過神明監于度人諸厄經訓敷具朝英刋施福祿眷聚青帝天君吾號雷霆猛吏賞善罰惡無情讒佞不忠不孝歘發雷火皆焚奸邪怨怒天地奏聞上帝滅形既有謝雷經呪諸人展誦來因傳生道義好道捨財刋此真經若依不犯天律衣食飽暖安寧雷泓召吾讃經附於誠真靖筆
