front:
  text: 太上說朝天謝雷真經盈十昔天尊於龍漢元年在浮羅世界中觀衆生有不信三寶及五悖之人身謝之後沈沒三塗永墮地獄為鬼或犯天條檢責下鬼所誣一切衆生有諸苦楚不知解謝之門果熟之時致招重病雷擊身沒之後永墮餓鬼畜生致使魂神被考禍患來鍾深可悲哉無由解脫不知上天檢舉有犯天條至招雷擊三十六條世人莫能知之天尊為說三十六條朝天謝雷真經令人祈謝罪惡庶知果報昭然明所報也如此果報豈不痛哉為說天條令使敬重天地日月神靈忠孝君親令知宿命善惡因緣延生之路朝天謝罪必獲感通之理請正一道士或於觀宇或在家庭隨力章醮請行法事解謝祈延生算虛空採訪使者隨即奏告上逹天司罪惡消除福祿增崇善功圓滿以降吉祥世人罪福皆屬天曹所管為人豈不知之此經乃上天所寶不傅下世天人敬仰萬聖衛之金闕靈章有不信之者永墮鄷都天尊為說報應靈符及天書篆明世人有犯天條被雷擊之者以將此符篆較之庶凡人則知太上感應如此立教也天雷十二條者不忠君主不孝父母不敬三寶拋擲五榖訶風罵兩裸露三光揚惡掩善不遵正道心昧天地信巫魘祝滅人福果毀壤經教犯此天條則天雷檢察為說此十二條以示下民庶知解謝地雷十二條者穢汚水漿將溷江河毀罵尊長疑真不信輕師忠本曬露䙝衣淫人妻女惟惡是增對聖毁願怨恨宗親不賑貪困對天妄語此十二條屬地雷所管以示下民俾曉懴謝之路人雷十二條者糜爛五穀大稱小斗荒年起價米中添水欺曲昧人穢語兩舌寸尺長短剋剝害人欺善懼惡久債不還謀人女妾酒肉殺生此十二條人雷主之世人莫能知之以示下民庶知解謝天雷十二者神霄雷公五方雷公行兩雷公行風雷公行雲雷公布澤雷公行雲雷公行氷雷公飛砂雷公食崇雷公吞鬼雷公伏魔雷公此十二雷公係屬天分犯天令則禳此十二雷公以免擊罪地雷十二者紏善雷公罰惡雷公社令雷公發稻雷公四序雷公却災雷公收毒雷公救病雷公挾危雷公太升雷公巡天雷公察地雷公此十二雷乃屬地分凡人犯地罪則燒香祈天請罪以免災苦之因禱無不應也人雷十二者收瘟雷公攝毒雷公除害雷公却禍雷公封山雷公破廟雷公打鬼雷公伏虎雷公破瘴雷公滅尸雷公蕩怪雷公管魄雷公此十二雷乃屬人分凡人犯人罪可燒香告斗隨心禱祝以免此苦厄乃大道好生之德也道言此三十六雷則能輕重善惡敬之則不犯條律以降吉祥不遵敬禮故犯條律則示重罪陽貴貧窮困苦滿足轉轉不信墮落地獄為鬼復出受生身過雷擊之後北鄷為鬼難求出離苦楚豈不痛哉北酆有一百二十獄其獄各有獄主獄吏毒虎毒蛇毒犬刀刃峯山獄吏以杖逐其罪人登山履刃毒蛇纏身罪人身體皆參力刃血流滿身毒獸食飲其血萬死萬生無有晝夜此皆罪人生前致招墮于北酆難可盡述言不可泄略垂九種大道開演此經令使世上凡人知畏若有此獲罪之因獲報陽責可以隨力燒香虔心告懇天地祈謝原愆以免獲報若有男女在世貧窮亦可修心整行轉誦此經得謝身惡以禳困苦自然天佑之矣大道立言凡人不可以為常耳亦不可輕泄此文乃上天隱祕之書凡人可能敬重此經在處有衛經元帥六人靈官一十四人天兵一萬五百人土地社令當所管城隍主宰九州風伯城境天神護持此經誦轉此經魔精滅形生人受之身宮康泰死者得之度上南宮及有帝主國王后妃臣宰為國焚祈豐稔亦可開轉此經能禳域境民物盡泰四序清平永無勍敵道言凡有上士欲修仙法採尋藥圃遇毒蛇虎狼之獸速誦此經惡類返歸其元不能傷害自然回退得遇真劑學道駸進有會本源故獲善士同志心逹玄妙無不應也亢陽不雨亦可轉誦此經以禳缺澤之厄蟲蝗傷稼燒香誦持則滅其類以消蟲毒境域水泛不退浸崩地土故當速轉真經其水自退不能淹陷其所及有一切瘟㾮瘴疫之者連年不瘥鬼祟伏尸魔魅在所為禍不能除却可以燒香轉誦真經其祟消滅不能傷害自然安愈此經到處萬神侍衛精魔潜走不敢仰視如此威靈凡人有昧律法故當以天篆垂報之後有獲雷擊之人天書或在背胸前脅下手足之上將此經中天篆參究庶知太上之感應然後焚香請正一道士轉誦此經方移其尸祈天雷宥罪方可將棺槨盛之以板閉上留一孔露天雷不復擊以厝去處牛馬亦如此乎敬禮此經不犯律件世世為人衣祿永滋壽命延長不敬之者掠善仙官録惡使臣奏呈天府積業過多滿足條令上命一行告下城隍主者隨即行事既滅之後身經北酆永無出離當為書篆以示陽民可虔心遵信凡人不可不知也
